<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教員ネットワーク可視化</title>
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style type="text/css">
        html, body {
            font-family: sans-serif;
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #f7f7f7;
        }
        #container {
            display: flex;
            width: 100%;
            height: calc(100% - 60px); /* Adjust height for the controls */
        }
        #history-panel {
            width: 30%;
            height: 100%;
            overflow-y: auto;
            border-right: 1px solid lightgray;
            padding: 10px;
            background-color: #fafafa;
        }
        #mynetwork {
            width: 70%;
            height: 100%;
            border: none;
        }
        .history-item {
            margin-bottom: 10px;
            padding: 8px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .history-item p {
            margin: 0;
        }
        .history-item .school {
            font-weight: bold;
        }
        .history-item .inferred {
            font-style: italic;
            color: #888;
        }
    </style>
</head>
<body>
<!-- cache buster -->

<div class="controls">
    <input type="text" id="teacherName" placeholder="教員の名前を入力...">
    <button id="search-button">Add to Network</button>
    <button id="clear-button">Clear Network</button>
</div>

<div id="container">
    <div id="history-panel">
        <h3>勤務履歴</h3>
        <div id="history-list"></div>
    </div>
    <div id="mynetwork"></div>
</div>

<div id="loading">読み込み中...</div>

<script type="text/javascript">
    const container = document.getElementById('mynetwork');
    const historyList = document.getElementById('history-list');
    const teacherNameInput = document.getElementById('teacherName');
    const loadingDiv = document.getElementById('loading');

    // --- Global State ---
    const nodes = new vis.DataSet([]);
    const edges = new vis.DataSet([]);
    let teachersDB = [];
    let teachersTenures = [];
    let teacherIdMap = new Map();
    let teacherNameMap = new Map();
    let tenuresBySchoolMap = new Map();

    // State for new features
    let searchedTeachers = new Set(); // Keep track of all explicitly searched teachers
    let excludedTenures = new Set(); // Keep track of excluded tenure records by a unique ID

    const options = {
        nodes: {
            shape: 'dot',
            size: 20,
            font: {
                size: 14,
                color: '#333'
            },
            borderWidth: 2
        },
        edges: {
            width: 2
        },
        physics: {
            enabled: true,
            solver: 'forceAtlas2Based',
            forceAtlas2Based: {
                gravitationalConstant: -50,
                centralGravity: 0.01,
                springConstant: 0.08,
                springLength: 150,
                damping: 0.4,
                avoidOverlap: 1
            }
        },
        interaction: {
            hover: true,
            tooltipDelay: 200
        }
    };

    const network = new vis.Network(container, { nodes, edges }, options);

    // --- Data Loading ---
    async function loadData() {
        if (teachersDB.length > 0) return; // Do not reload if already loaded
        try {
            const [dbResponse, tenuresResponse1, tenuresResponse2] = await Promise.all([
                fetch('teachers_db.json'),
                fetch('teachers_tenures_part1.json'),
                fetch('teachers_tenures_part2.json')
            ]);
            teachersDB = await dbResponse.json();
            const tenures1 = await tenuresResponse1.json();
            const tenures2 = await tenuresResponse2.json();
            
            let idCounter = 0;
            teachersTenures = tenures1.concat(tenures2).map(t => ({ ...t, uniqueId: idCounter++ }));

            for (const teacher of teachersDB) {
                teacherIdMap.set(teacher.id, teacher);
                teacherNameMap.set(teacher.name, teacher);
            }

            for (const tenure of teachersTenures) {
                if (!tenuresBySchoolMap.has(tenure.school)) {
                    tenuresBySchoolMap.set(tenure.school, []);
                }
                tenuresBySchoolMap.get(tenure.school).push(tenure);
            }
        } catch (error) {
            console.error("Failed to load or parse database files:", error);
            alert("データベースの読み込みに失敗しました。");
        }
    }

    // --- Core Logic ---
    function getRandomColor() {
        const letters = '0123456789ABCDEF';
        let color = '#';
        for (let i = 0; i < 6; i++) {
            color += letters[Math.floor(Math.random() * 16)];
        }
        return color;
    }

    // Main function to recalculate and draw the entire network from the current state
    function rebuildAndDrawNetwork() {
        loadingDiv.style.display = 'block';

        const allNodes = new Map();
        const allEdges = new Map();
        
        historyList.innerHTML = '<h3>勤務履歴</h3>'; // Reset history panel

        // Filter out excluded tenures from the main list once
        const validTenures = teachersTenures.filter(t => !excludedTenures.has(t.uniqueId));
        
        // Rebuild the school-to-tenure map with only valid tenures
        const validTenuresBySchoolMap = new Map();
        for (const tenure of validTenures) {
            if (!validTenuresBySchoolMap.has(tenure.school)) {
                validTenuresBySchoolMap.set(tenure.school, []);
            }
            validTenuresBySchoolMap.get(tenure.school).push(tenure);
        }

        searchedTeachers.forEach(teacherName => {
            const teacher = teacherNameMap.get(teacherName);
            if (!teacher) return;

            const searchColor = getRandomColor();
            allNodes.set(teacher.id, { id: teacher.id, label: teacher.name, color: searchColor, font: { size: 24 } });

            const teacherTenures = validTenures.filter(t => t.teacher_id === teacher.id);
            
            const colleagues = new Set();
            for (const tenure of teacherTenures) {
                const schoolTenures = validTenuresBySchoolMap.get(tenure.school) || [];
                for (const st of schoolTenures) {
                    if (st.teacher_id !== teacher.id) {
                        const overlaps = st.start_year < tenure.end_year && tenure.start_year < st.end_year;
                        const isNotExcluded = !(tenure.start_year === st.end_year || tenure.end_year === st.start_year);
                        if (overlaps && isNotExcluded) {
                            colleagues.add(st.teacher_id);
                        }
                    }
                }
            }

            colleagues.forEach(colleagueId => {
                const colleague = teacherIdMap.get(colleagueId);
                if (colleague) {
                    if (!allNodes.has(colleague.id)) {
                        allNodes.set(colleague.id, { id: colleague.id, label: colleague.name });
                    }
                    const edgeId = [teacher.id, colleague.id].sort().join('-');
                    if (!allEdges.has(edgeId)) {
                        allEdges.set(edgeId, { id: edgeId, from: teacher.id, to: colleague.id });
                    }
                }
            });
            
            // Render history for this teacher
            renderHistory(teacher, searchColor);
        });

        nodes.clear();
        edges.clear();
        nodes.update(Array.from(allNodes.values()));
        edges.update(Array.from(allEdges.values()));
        
        loadingDiv.style.display = 'none';
        network.fit();
    }
    
    function renderHistory(teacher, color) {
        const historyHeader = document.createElement('h4');
        historyHeader.textContent = teacher.name;
        historyHeader.style.color = color;
        historyList.appendChild(historyHeader);

        const teacherTenures = teachersTenures.filter(t => t.teacher_id === teacher.id)
            .sort((a, b) => a.start_year - b.start_year);

        if (teacherTenures.length > 0) {
            teacherTenures.forEach(tenure => {
                const item = document.createElement('div');
                item.className = 'history-item';
                if (excludedTenures.has(tenure.uniqueId)) {
                    item.style.backgroundColor = '#e0e0e0';
                    item.style.textDecoration = 'line-through';
                }

                const inferredText = tenure.inferred_start ? ' <span class="inferred">(推定)</span>' : '';
                const text = `<p class="school">${tenure.school}</p><p>期間: ${tenure.start_year} - ${tenure.end_year}${inferredText}</p>`;
                
                const deleteButton = document.createElement('button');
                deleteButton.textContent = '除外';
                deleteButton.style.marginLeft = '10px';
                deleteButton.style.padding = '2px 5px';
                deleteButton.onclick = () => handleExcludeTenure(tenure.uniqueId);

                item.innerHTML = text;
                item.appendChild(deleteButton);
                historyList.appendChild(item);
            });
        } else {
            const noHistory = document.createElement('p');
            noHistory.textContent = '勤務履歴が見つかりませんでした。';
            historyList.appendChild(noHistory);
        }
    }

    async function handleSearch() {
        const teacherName = teacherNameInput.value.trim();
        if (!teacherName) {
            alert('教員の名前を入力してください。');
            return;
        }
        
        await loadData();
        
        if (!teacherNameMap.has(teacherName)) {
            alert('教員が見つかりませんでした。');
            return;
        }

        searchedTeachers.add(teacherName);
        rebuildAndDrawNetwork();
    }

    function handleClear() {
        searchedTeachers.clear();
        excludedTenures.clear();
        nodes.clear();
        edges.clear();
        historyList.innerHTML = '<h3>勤務履歴</h3>';
    }

    function handleExcludeTenure(tenureId) {
        excludedTenures.add(tenureId);
        rebuildAndDrawNetwork();
    }

    // --- Event Listeners ---
    network.on("click", function (params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            const clickedNode = nodes.get(nodeId);
            if (clickedNode) {
                teacherNameInput.value = clickedNode.label;
                handleSearch();
            }
        }
    });

    document.getElementById('search-button').onclick = handleSearch;
    document.getElementById('clear-button').onclick = handleClear;
    teacherNameInput.addEventListener("keyup", function(event) {
        if (event.key === "Enter") {
            event.preventDefault();
            handleSearch();
        }
    });
</script>

</body>
</html>
