<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教員ネットワーク可視化（精密計算・自動マージ版）</title>
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style type="text/css">
        html, body {
            font-family: sans-serif;
            width: 100%; height: 100%; margin: 0; padding: 0;
            overflow: hidden; background-color: #f7f7f7;
        }
        .controls {
            padding: 10px; box-sizing: border-box; height: 60px;
            display: flex; align-items: center; gap: 10px;
            background: #fff; border-bottom: 1px solid #ddd;
        }
        .search-container { position: relative; display: inline-block; }
        #teacherName { width: 250px; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        .suggestions {
            position: absolute; border: 1px solid #ddd; background: #fff;
            z-index: 1000; width: 100%; max-height: 200px; overflow-y: auto;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1); display: none;
        }
        .suggestions div { padding: 8px; cursor: pointer; border-bottom: 1px solid #eee; }
        .suggestions div:hover { background-color: #f0f0f0; }

        #container { display: flex; width: 100%; height: calc(100% - 60px); }
        #history-panel {
            width: 300px; height: 100%; overflow-y: auto;
            border-right: 1px solid lightgray; padding: 15px; background-color: #fafafa;
        }
        #mynetwork { flex-grow: 1; height: 100%; }
        .history-item {
            margin-bottom: 10px; padding: 10px; background: #fff;
            border: 1px solid #ddd; border-radius: 5px; font-size: 0.9em;
        }
        .history-item b { color: #333; }
        #loading {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8); color: #fff; padding: 20px; border-radius: 10px;
            display: none; z-index: 2000; text-align: center;
        }
        button { padding: 8px 15px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>

<div class="controls">
    <div class="search-container">
        <input type="text" id="teacherName" placeholder="教員名を入力（例：内山）..." autocomplete="off">
        <div id="suggestions" class="suggestions"></div>
    </div>
    <button id="search-button">検索</button>
    <button id="clear-button" style="background:#6c757d">クリア</button>
</div>

<div id="container">
    <div id="history-panel">
        <h3>勤務履歴</h3>
        <div id="history-list"></div>
    </div>
    <div id="mynetwork"></div>
</div>

<div id="loading">データを読み込み中...<br><small>データの結合処理を行っています</small></div>

<script type="text/javascript">
    const nodes = new vis.DataSet([]);
    const edges = new vis.DataSet([]);
    const historyList = document.getElementById('history-list');
    const teacherInput = document.getElementById('teacherName');
    const suggestionBox = document.getElementById('suggestions');
    const loading = document.getElementById('loading');

    let db = [];
    let tenures = [];
    let nameMap = new Map();
    let searchedIds = new Set();

    // 物理エンジンの設定
    const options = {
        nodes: { shape: 'dot', size: 20, font: { size: 14 } },
        edges: { color: '#999', smooth: { type: 'continuous' } },
        physics: { 
            enabled: true,
            solver: 'forceAtlas2Based',
            forceAtlas2Based: {
                gravitationalConstant: -200,
                centralGravity: 0.005,       
                springLength: 300,  
                springConstant: 0.02,        
                avoidOverlap: 1              
            },
            stabilization: { iterations: 150, fit: true }
        }
    };

    const network = new vis.Network(document.getElementById('mynetwork'), { nodes, edges }, options);

    async function init() {
        loading.style.display = 'block';
        try {
            const dbRes = await fetch('teachers_db.json');
            db = await dbRes.json();
            db.forEach(t => nameMap.set(t.name, t.id));

            // 分割ファイルを読み込む
            const partFiles = ['teachers_tenures_part1.json', 'teachers_tenures_part2.json', 'teachers_tenures_part3.json'];
            const tenurePromises = partFiles.map(file => fetch(file).then(r => r.json()).catch(() => []));
            const tenureResults = await Promise.all(tenurePromises);
            let rawTenures = tenureResults.flat();

            // ★ 新機能：データの自動マージ（結合）処理 ★
            // バラバラな「着任」と「離任」の記録を合体させ、確定期間を作ります
            let mergedTenures = [];
            db.forEach(teacher => {
                let t_records = rawTenures.filter(t => t.teacher_id === teacher.id);
                if (t_records.length === 0) return;
                
                // 学校名から「・副」や「［江東区］」などを除外したベース名でグループ化
                let groups = {};
                t_records.forEach(t => {
                    let baseSchool = t.school.split(/[・［\(\（]/)[0].trim();
                    if (!groups[baseSchool]) groups[baseSchool] = [];
                    groups[baseSchool].push(t);
                });

                for (let sName in groups) {
                    let records = groups[sName];
                    records.sort((a, b) => a.start_year - b.start_year); // 古い順に並べる
                    
                    let current = null;
                    for (let r of records) {
                        if (!current) {
                            current = { ...r };
                            continue;
                        }
                        
                        // 期間が重なっている、または連続している場合は合体！
                        if (current.end_year >= r.start_year) {
                            // 開始の確定処理
                            if (!current.inferred_start) {
                                // 既に確定なら何もしない
                            } else if (!r.inferred_start) {
                                current.start_year = r.start_year;
                                current.inferred_start = false; // 推定フラグを消す
                            } else {
                                current.start_year = Math.min(current.start_year, r.start_year);
                            }
                            
                            // 終了の確定処理
                            if (!current.inferred_end) {
                                // 既に確定なら何もしない
                            } else if (!r.inferred_end) {
                                current.end_year = r.end_year;
                                current.inferred_end = false; // 推定フラグを消す
                            } else {
                                current.end_year = Math.max(current.end_year, r.end_year);
                            }
                            
                            // 役職などの表示名は、より詳しい方（文字数が長い方）を残す
                            if (r.school.length > current.school.length) current.school = r.school;
                            if (r.role && (!current.role || r.role.length > current.role.length)) current.role = r.role;
                        } else {
                            mergedTenures.push(current);
                            current = { ...r };
                        }
                    }
                    if (current) mergedTenures.push(current);
                }
            });
            
            tenures = mergedTenures;
            loading.style.display = 'none';
        } catch (e) {
            console.error(e);
            alert("データの読み込みに失敗しました。ファイル名を確認してください。");
            loading.style.display = 'none';
        }
    }

    // サジェスト機能
    teacherInput.addEventListener('input', (e) => {
        const val = e.target.value;
        suggestionBox.innerHTML = '';
        if (val.length < 1) { suggestionBox.style.display = 'none'; return; }

        const matches = db.filter(t => t.name.includes(val)).slice(0, 10);
        if (matches.length > 0) {
            matches.forEach(m => {
                const div = document.createElement('div');
                div.textContent = m.name;
                div.onclick = () => {
                    teacherInput.value = m.name;
                    suggestionBox.style.display = 'none';
                    searchTeacher(m.id);
                };
                suggestionBox.appendChild(div);
            });
            suggestionBox.style.display = 'block';
        } else {
            suggestionBox.style.display = 'none';
        }
    });

    document.addEventListener('click', function(e) {
        if (!e.target.closest('.search-container')) {
            suggestionBox.style.display = 'none';
        }
    });

    // 動的計算 ＋ 精密日付計算ロジック
    function searchTeacher(targetId) {
        if (searchedIds.has(targetId)) return;
        searchedIds.add(targetId);

        const person = db.find(t => t.id === targetId);
        if (!person) return;

        nodes.update({ id: person.id, label: person.name, color: '#ffc107', size: 25 });
        renderHistory(person);

        const myTenures = tenures.filter(t => t.teacher_id === targetId);

        myTenures.forEach(myT => {
            const colleagues = tenures.filter(t => t.school === myT.school && t.teacher_id !== targetId);
            
            colleagues.forEach(coT => {
                // 現在の「年度」データを「4月1日」「3月31日」の日付データに仮想的に変換（入れ違い排除のため）
                const myStart = myT.start_date ? new Date(myT.start_date) : new Date(myT.start_year, 3, 1);
                const myEnd = myT.end_date ? new Date(myT.end_date) : new Date(myT.end_year, 2, 31);
                const coStart = coT.start_date ? new Date(coT.start_date) : new Date(coT.start_year, 3, 1);
                const coEnd = coT.end_date ? new Date(coT.end_date) : new Date(coT.end_year, 2, 31);

                // 重なり期間の計算
                const overlapStart = myStart > coStart ? myStart : coStart;
                const overlapEnd = myEnd < coEnd ? myEnd : coEnd;

                // ミリ秒を「日数」に変換
                const overlapDays = (overlapEnd - overlapStart) / (1000 * 60 * 60 * 24);

                // 日数が0より大きい（1日以上かぶっている）場合のみ線を引く
                if (overlapDays > 0) {
                    const coPerson = db.find(t => t.id === coT.teacher_id);
                    if (!coPerson) return;

                    // 日数を年数に変換してデザインを調整
                    const overlapYears = overlapDays / 365;
                    const dynamicLength = Math.max(100, 350 - (overlapYears * 30));
                    const dynamicWidth = 2 + (overlapYears * 0.5);

                    // 推定かどうかの判定
                    const isInf = (myT.inferred_start && myStart.getTime() === overlapStart.getTime()) || 
                                  (coT.inferred_start && coStart.getTime() === overlapStart.getTime()) ||
                                  (myT.inferred_end && myEnd.getTime() === overlapEnd.getTime()) ||
                                  (coT.inferred_end && coEnd.getTime() === overlapEnd.getTime());

                    // 表示用テキスト（小数点第1位まで）
                    const lblYears = Math.round(overlapYears * 10) / 10;

                    nodes.update({ id: coPerson.id, label: coPerson.name });
                    edges.update({
                        id: `${targetId}-${coPerson.id}-${myT.school}`,
                        from: targetId,
                        to: coPerson.id,
                        label: `${myT.school}\n${lblYears}年${isInf ? ' [推定]' : ''}`,
                        dashes: isInf,
                        length: dynamicLength, 
                        width: dynamicWidth,   
                        font: { size: 10, color: '#666', background: 'rgba(255,255,255,0.8)' }
                    });
                }
            });
        });
        
        setTimeout(() => {
            network.fit({ animation: { duration: 1000, easingFunction: 'easeInOutQuad' } });
        }, 500);
    }

    function renderHistory(person) {
        const myTenures = tenures.filter(t => t.teacher_id === person.id)
                                 .sort((a,b) => a.start_year - b.start_year);
        
        const header = document.createElement('div');
        header.innerHTML = `<hr><b>${person.name}さんの経歴</b>`;
        historyList.appendChild(header);

        myTenures.forEach(t => {
            const item = document.createElement('div');
            item.className = 'history-item';
            
            // フラグから表示するテキストを決定
            let infText = '';
            if (t.inferred_start && t.inferred_end) infText = '開始・終了 推定';
            else if (t.inferred_start) infText = '開始 推定';
            else if (t.inferred_end) infText = '終了 推定';
            else infText = '確定';

            item.innerHTML = `
                <b>${t.school}</b> (${t.role || '教員'})<br>
                期間: ${t.start_year} 〜 ${t.end_year}<br>
                <small style="color:${infText === '確定' ? '#28a745' : 'gray'}">${infText}</small>
            `;
            historyList.appendChild(item);
        });
    }

    document.getElementById('search-button').onclick = () => {
        const id = nameMap.get(teacherInput.value);
        if (id !== undefined) {
            suggestionBox.style.display = 'none';
            searchTeacher(id);
        }
        else alert("該当する教員が見つかりません。リストから選択してください。");
    };

    document.getElementById('clear-button').onclick = () => {
        nodes.clear(); edges.clear(); historyList.innerHTML = ''; searchedIds.clear(); teacherInput.value = '';
    };

    network.on("click", (params) => {
        if (params.nodes.length > 0) searchTeacher(params.nodes[0]);
    });

    init();
</script>
</body>
</html>
