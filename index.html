<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教員ネットワーク可視化</title>
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style type="text/css">
        html, body {
            font-family: sans-serif;
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #f7f7f7;
        }
        #container {
            display: flex;
            width: 100%;
            height: calc(100% - 60px); /* Adjust height for the controls */
        }
        #history-panel {
            width: 30%;
            height: 100%;
            overflow-y: auto;
            border-right: 1px solid lightgray;
            padding: 10px;
            background-color: #fafafa;
        }
        #mynetwork {
            width: 70%;
            height: 100%;
            border: none;
        }
        .history-item {
            margin-bottom: 10px;
            padding: 8px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .history-item p {
            margin: 0;
        }
        .history-item .school {
            font-weight: bold;
        }
        .history-item .inferred {
            font-style: italic;
            color: #888;
        }
    </style>
</head>
<body>
<!-- cache buster -->

<div class="controls">
    <input type="text" id="teacherName" placeholder="教員の名前を入力...">
    <button id="search-button">Add to Network</button>
    <button id="clear-button">Clear Network</button>
</div>

<div id="container">
    <div id="history-panel">
        <h3>勤務履歴</h3>
        <div id="history-list"></div>
    </div>
    <div id="mynetwork"></div>
</div>

<div id="loading">読み込み中...</div>

<script type="text/javascript">
    const container = document.getElementById('mynetwork');
    const historyList = document.getElementById('history-list');
    const teacherNameInput = document.getElementById('teacherName');
    const loadingDiv = document.getElementById('loading');

    // Initialize DataSets globally to hold the state of the network
    const nodes = new vis.DataSet([]);
    const edges = new vis.DataSet([]);

    const options = {
        nodes: {
            shape: 'dot',
            size: 20,
            font: {
                size: 14,
                color: '#333'
            },
            borderWidth: 2
        },
        edges: {
            width: 2
        },
        physics: {
            enabled: true,
            solver: 'forceAtlas2Based',
            forceAtlas2Based: {
                gravitationalConstant: -50,
                centralGravity: 0.01,
                springConstant: 0.08,
                springLength: 150, // Increased length for better spacing
                damping: 0.4,
                avoidOverlap: 1
            }
        },
        interaction: {
            hover: true,
            tooltipDelay: 200
        }
    };

    // Create the network instance once
    const network = new vis.Network(container, { nodes, edges }, options);

    // Event handler for clicking on a node
    network.on("click", function (params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            const clickedNode = nodes.get(nodeId);
            if (clickedNode) {
                teacherNameInput.value = clickedNode.label;
                searchNetwork(false); // Perform an incremental search
            }
        }
    });

    let teachersDB = [];
    let teachersTenures = [];
    let teacherIdMap = new Map();
    let teacherNameMap = new Map();
    let tenuresBySchoolMap = new Map();

    async function loadData() {
        if (teachersDB.length === 0) {
            try {
                const [dbResponse, tenuresResponse1, tenuresResponse2] = await Promise.all([
                    fetch('teachers_db.json'),
                    fetch('teachers_tenures_part1.json'),
                    fetch('teachers_tenures_part2.json')
                ]);
                teachersDB = await dbResponse.json();
                const tenures1 = await tenuresResponse1.json();
                const tenures2 = await tenuresResponse2.json();
                teachersTenures = tenures1.concat(tenures2);

                for (const teacher of teachersDB) {
                    teacherIdMap.set(teacher.id, teacher);
                    teacherNameMap.set(teacher.name, teacher);
                }

                for (const tenure of teachersTenures) {
                    if (!tenuresBySchoolMap.has(tenure.school)) {
                        tenuresBySchoolMap.set(tenure.school, []);
                    }
                    tenuresBySchoolMap.get(tenure.school).push(tenure);
                }
            } catch (error) {
                console.error("Failed to load or parse database files:", error);
            }
        }
    }

    function getRandomColor() {
        const letters = '0123456789ABCDEF';
        let color = '#';
        for (let i = 0; i < 6; i++) {
            color += letters[Math.floor(Math.random() * 16)];
        }
        return color;
    }

    async function searchNetwork(isNewSearch = false) { // Default to incremental search
        const teacherName = teacherNameInput.value.trim();
        if (!teacherName) {
            alert('教員の名前を入力してください。');
            return;
        }

        loadingDiv.style.display = 'block';

        if (isNewSearch) {
            nodes.clear();
            edges.clear();
            historyList.innerHTML = '<h3>勤務履歴</h3>'; // Clear history only on new search
        }

        await loadData();

        try {
            const teacher = teacherNameMap.get(teacherName);

            if (!teacher) {
                alert('教員が見つかりませんでした。');
                loadingDiv.style.display = 'none';
                return;
            }

            // If the teacher node already exists, searching for it again will simply
            // reveal its connections and re-highlight it with a new color.

            const teacherTenures = teachersTenures.filter(t => t.teacher_id === teacher.id);

            const colleagues = new Set();
            for (const tenure of teacherTenures) {
                const schoolTenures = tenuresBySchoolMap.get(tenure.school) || [];
                for (const st of schoolTenures) {
                    if (st.teacher_id !== teacher.id) {
                        const overlaps = st.start_year < tenure.end_year && tenure.start_year < st.end_year;
                        const isNotExcluded = !(tenure.start_year === st.end_year || tenure.end_year === st.start_year);

                        if (overlaps && isNotExcluded) {
                            const colleague = teacherIdMap.get(st.teacher_id);
                            if (colleague) {
                                colleagues.add(colleague.name);
                            }
                        }
                    }
                }
            }

            const searchColor = getRandomColor();
            const centralNode = { id: teacher.id, label: teacher.name, color: searchColor, font: { size: 24 } };
            const newNodes = [centralNode];
            const newEdges = [];
            const colleagueNames = Array.from(colleagues);

            for (const colleagueName of colleagueNames) {
                const colleague = teacherNameMap.get(colleagueName);
                if (colleague) {
                    if (!nodes.get(colleague.id)) { // Add colleague only if not present
                        newNodes.push({ id: colleague.id, label: colleague.name });
                    }
                    // Create a unique edge ID to prevent duplicates
                    const edgeId = [teacher.id, colleague.id].sort().join('-');
                    if (!edges.get(edgeId)) {
                        newEdges.push({ id: edgeId, from: teacher.id, to: colleague.id });
                    }
                }
            }

            const formattedHistory = teacherTenures.map(t => ({
                school: t.school,
                startYear: t.start_year,
                endYear: t.end_year,
                inferred: t.inferred_start
            })).sort((a, b) => a.start_year - b.start_year);

            // Add history for the new teacher
            const historyHeader = document.createElement('h4');
            historyHeader.textContent = teacher.name;
            historyHeader.style.color = searchColor;
            historyList.appendChild(historyHeader);

            if (formattedHistory.length > 0) {
                formattedHistory.forEach(tenure => {
                    const item = document.createElement('div');
                    item.className = 'history-item';
                    const inferredText = tenure.inferred ? '<span class="inferred">(推定)</span>' : '';
                    item.innerHTML = `<p class="school">${tenure.school}</p><p>期間: ${tenure.startYear} - ${tenure.endYear} ${inferredText}</p>`;
                    historyList.appendChild(item);
                });
            } else {
                const noHistory = document.createElement('p');
                noHistory.textContent = '勤務履歴が見つかりませんでした。';
                historyList.appendChild(noHistory);
            }

            nodes.update(newNodes);
            edges.update(newEdges);

            if (newNodes.length === 1 && newEdges.length === 0) {
                 alert('教員は見つかりましたが、関連する同僚データが見つかりませんでした。');
            }

        } catch (error) {
            console.error('Error:', error);
            alert('エラーが発生しました。詳細はコンソールを確認してください。');
        } finally {
            loadingDiv.style.display = 'none';
            network.fit();
        }
    }

    // Bind the main search button to an incremental search
    document.getElementById('search-button').onclick = () => searchNetwork(false);

    // Bind the clear button to a new search (clearing the network)
    document.getElementById('clear-button').onclick = () => searchNetwork(true);

    // Bind the Enter key to an incremental search
    teacherNameInput.addEventListener("keyup", function(event) {
        if (event.key === "Enter") {
            event.preventDefault();
            searchNetwork(false);
        }
    });
</script>

</body>
</html>
