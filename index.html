<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教員ネットワーク可視化</title>
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style type="text/css">
        html, body {
            font-family: sans-serif;
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #f7f7f7;
        }
        .controls {
            padding: 10px;
            box-sizing: border-box;
            height: 50px;
        }
        #container {
            display: flex;
            width: 100%;
            height: calc(100% - 50px);
        }
        #history-panel {
            width: 30%;
            height: 100%;
            overflow-y: auto;
            border-right: 1px solid lightgray;
            padding: 10px;
            background-color: #fafafa;
        }
        #mynetwork {
            width: 70%;
            height: 100%;
            border: none;
        }
        .history-item {
            margin-bottom: 10px;
            padding: 8px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .history-item p { margin: 0; }
        .history-item .school { font-weight: bold; }
        .history-item .inferred { font-style: italic; color: #888; }
        #footer-explanation {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: #f8f8f8;
            border-top: 1px solid #ccc;
            z-index: 1000;
            box-shadow: 0 -2px 5px rgba(0,0,0,0.1);
        }
        #explanation-toggle-button {
            width: 100%;
            padding: 8px;
            font-size: 14px;
            cursor: pointer;
            border: none;
            background-color: #e9e9e9;
            text-align: center;
        }
        #explanation-content {
            padding: 15px;
            background-color: #fff;
            border-top: 1px solid #ccc;
            font-size: 14px;
            max-height: 200px;
            overflow-y: auto;
        }
        #explanation-content ul { margin: 5px 0 0 0; padding-left: 20px; }
        #explanation-content li { margin-bottom: 5px; }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 20px;
            border-radius: 8px;
            z-index: 2000;
        }
    </style>
</head>
<body>
<div class="controls">
    <input type="text" id="teacherName" placeholder="教員の名前を入力...">
    <button id="search-button">Add to Network</button>
    <button id="clear-button">Clear Network</button>
</div>

<div id="container">
    <div id="history-panel">
        <h3>勤務履歴</h3>
        <div id="history-list"></div>
    </div>
    <div id="mynetwork"></div>
</div>

<div id="loading" style="display: none;">データを読み込み中...<br><small>※初回は少し時間がかかります</small></div>

<div id="footer-explanation">
    <button id="explanation-toggle-button">使い方・注意点 ▼</button>
    <div id="explanation-content" style="display: none;">
        <strong>【使い方と注意点】</strong>
        <ul>
            <li>① フルネームを入れると同僚だった人の名前が出ます。</li>
            <li>② 2人分入れると別々に出ます。（つながりがある場合はネットワークがつながります。）</li>
            <li>③ 出てきた名前をクリックするとその人の同僚も出ます。</li>
            <li>④ 新規採用、産休育休、退職などは公開情報がないので上手に入りません。</li>
            <li>⑤ 異動の発表の公開情報を使用しています。</li>
            <li>⑥ 勤務履歴の「除外」ボタンを押すと、その履歴を除いたネットワークに更新されます。</li>
        </ul>
    </div>
</div>

<script type="text/javascript">
    const container = document.getElementById('mynetwork');
    const historyList = document.getElementById('history-list');
    const teacherNameInput = document.getElementById('teacherName');
    const loadingDiv = document.getElementById('loading');

    const nodes = new vis.DataSet([]);
    const edges = new vis.DataSet([]);
    let teachersDB = [];
    let teachersTenures = [];
    let colleagueLinks = []; // 追加: 計算済みのリンクデータ
    let teacherIdMap = new Map();
    let teacherNameMap = new Map();
    let searchedTeachers = new Set();
    let excludedTenures = new Set();

    const options = {
        nodes: { shape: 'dot', size: 20, font: { size: 14, color: '#333' }, borderWidth: 2 },
        edges: { width: 2, font: { size: 10, align: 'middle', background: 'rgba(255,255,255,0.7)' } },
        physics: {
            enabled: true,
            solver: 'forceAtlas2Based',
            forceAtlas2Based: { gravitationalConstant: -50, centralGravity: 0.01, springConstant: 0.08, springLength: 150, damping: 0.4, avoidOverlap: 1 }
        },
        interaction: { hover: true, tooltipDelay: 200 }
    };

    const network = new vis.Network(container, { nodes, edges }, options);

    async function loadData() {
        if (teachersDB.length > 0) return;
        loadingDiv.style.display = 'block';
        
        try {
            // 名簿と履歴はローカル（または同じ場所）から取得
            const dbResponse = await fetch('teachers_db.json');
            teachersDB = await dbResponse.json();

            const tenuresResponse = await fetch('teachers_tenures.json');
            const tenures = await tenuresResponse.json();
            
            // ✅ 重いリンクデータはGitHub ReleasesのURLから直接取得！
            const linksResponse = await fetch('https://github.com/Ntetetsu/teachernetwork-v2/releases/download/01/colleague_links.json');
            colleagueLinks = await linksResponse.json();

            let idCounter = 0;
            teachersTenures = tenures.map(t => ({ ...t, uniqueId: idCounter++ }));

            for (const teacher of teachersDB) {
                teacherIdMap.set(teacher.id, teacher);
                teacherNameMap.set(teacher.name, teacher);
            }
        } catch (error) {
            console.error("データの読み込みエラー:", error);
            alert("データの読み込みに失敗しました。ファイルが存在するか確認してください。");
        } finally {
            loadingDiv.style.display = 'none';
        }
    }

    function getRandomColor() {
        const letters = '0123456789ABCDEF';
        let color = '#';
        for (let i = 0; i < 6; i++) color += letters[Math.floor(Math.random() * 16)];
        return color;
    }

    function rebuildAndDrawNetwork() {
        loadingDiv.style.display = 'block';
        setTimeout(() => {
            const allNodes = new Map();
            const allEdges = new Map();
            historyList.innerHTML = '<h3>勤務履歴</h3>';

            // 除外された履歴のデータを整理
            const excludedSchoolsAndPeriods = Array.from(excludedTenures).map(id => {
                const t = teachersTenures.find(tenure => tenure.uniqueId === id);
                return t ? { school: t.school, start: t.start_year, end: t.end_year } : null;
            }).filter(Boolean);

            searchedTeachers.forEach(teacherName => {
                const teacher = teacherNameMap.get(teacherName);
                if (!teacher) return;
                const searchColor = getRandomColor();
                allNodes.set(teacher.id, { id: teacher.id, label: teacher.name, color: searchColor, font: { size: 24 } });

                // ✅ 計算済みのリンクデータを直接使うので一瞬で終わります
                const relatedLinks = colleagueLinks.filter(link => link.from === teacher.id || link.to === teacher.id);

                relatedLinks.forEach(link => {
                    // ユーザーが「除外」した学校・期間のリンクは表示しない
                    const isExcluded = excludedSchoolsAndPeriods.some(ex => 
                        ex.school === link.school &&
                        link.period && link.period[0] >= ex.start && link.period[1] <= ex.end
                    );
                    if (isExcluded) return;

                    const colleagueId = link.from === teacher.id ? link.to : link.from;
                    const colleague = teacherIdMap.get(colleagueId);
                    
                    if (colleague) {
                        if (!allNodes.has(colleague.id)) {
                            allNodes.set(colleague.id, { id: colleague.id, label: colleague.name });
                        }
                        
                        // エッジ（線）の追加
                        const edgeId = `${link.from}-${link.to}-${link.school}`;
                        if (!allEdges.has(edgeId)) {
                            allEdges.set(edgeId, { 
                                id: edgeId, 
                                from: link.from, 
                                to: link.to,
                                label: `${link.school}\n${link.label}`, // 学校名と年数を表示
                                dashes: link.is_inferred, // 推定なら点線にする
                                color: { color: link.is_inferred ? '#ff9999' : '#9999ff', opacity: 0.8 }
                            });
                        }
                    }
                });

                renderHistory(teacher, searchColor);
            });

            nodes.clear();
            edges.clear();
            nodes.update(Array.from(allNodes.values()));
            edges.update(Array.from(allEdges.values()));
            loadingDiv.style.display = 'none';
            network.fit();
        }, 10);
    }

    function renderHistory(teacher, color) {
        const historyHeader = document.createElement('h4');
        historyHeader.textContent = teacher.name;
        historyHeader.style.color = color;
        historyList.appendChild(historyHeader);

        const teacherTenures = teachersTenures
            .filter(t => t.teacher_id === teacher.id)
            .sort((a, b) => a.start_year - b.start_year);

        if (teacherTenures.length > 0) {
            teacherTenures.forEach(tenure => {
                const item = document.createElement('div');
                item.className = 'history-item';
                if (excludedTenures.has(tenure.uniqueId)) {
                    item.style.backgroundColor = '#e0e0e0';
                    item.style.textDecoration = 'line-through';
                }
                const inferredText = (tenure.inferred_start || tenure.inferred_end)
                    ? ' <span class="inferred">[推定]</span>' : '';

                const text = `<p class="school">${tenure.school}</p><p>期間: ${tenure.start_year} 〜 ${tenure.end_year}${inferredText}</p>`;
                const deleteButton = document.createElement('button');
                deleteButton.textContent = '除外';
                deleteButton.style.marginLeft = '10px';
                deleteButton.style.padding = '2px 5px';
                deleteButton.onclick = () => handleExcludeTenure(tenure.uniqueId);
                item.innerHTML = text;
                item.appendChild(deleteButton);
                historyList.appendChild(item);
            });
        } else {
            const noHistory = document.createElement('p');
            noHistory.textContent = '勤務履歴が見つかりませんでした。';
            historyList.appendChild(noHistory);
        }
    }

    async function handleSearch() {
        const teacherName = teacherNameInput.value.trim();
        if (!teacherName) { alert('教員の名前を入力してください。'); return; }
        await loadData();
        if (!teacherNameMap.has(teacherName)) { alert('教員が見つかりませんでした。'); return; }
        searchedTeachers.add(teacherName);
        rebuildAndDrawNetwork();
    }

    function handleClear() {
        searchedTeachers.clear();
        excludedTenures.clear();
        nodes.clear();
        edges.clear();
        historyList.innerHTML = '<h3>勤務履歴</h3>';
    }

    function handleExcludeTenure(tenureId) {
        excludedTenures.add(tenureId);
        rebuildAndDrawNetwork();
    }

    network.on("click", function (params) {
        if (params.nodes.length > 0) {
            const nodeId = params.nodes[0];
            const clickedNode = nodes.get(nodeId);
            if (clickedNode) {
                teacherNameInput.value = clickedNode.label;
                handleSearch();
            }
        }
    });

    document.getElementById('search-button').onclick = handleSearch;
    document.getElementById('clear-button').onclick = handleClear;
    teacherNameInput.addEventListener("keyup", function(event) {
        if (event.key === "Enter") { event.preventDefault(); handleSearch(); }
    });

    const toggleButton = document.getElementById('explanation-toggle-button');
    const explanationContent = document.getElementById('explanation-content');
    toggleButton.addEventListener('click', () => {
        const isHidden = explanationContent.style.display === 'none';
        explanationContent.style.display = isHidden ? 'block' : 'none';
        toggleButton.innerHTML = isHidden ? '使い方・注意点 ▲' : '使い方・注意点 ▼';
    });
</script>
</body>
</html>
